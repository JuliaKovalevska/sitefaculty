<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        a { text-decoration: none; }
        nav { margin-bottom: 20px; }
        .navbar-custom {
            background-color: #6f42c1;
        }
        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color: #ffffff;
        }
        .navbar-custom .nav-link:hover {
            color: #d1c4e9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'main:home' %}">Головна</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'main:departments_list' %}">Кафедри</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'main:specialties_list' %}">Спеціальності</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'main:teachers_list' %}">Викладачі</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
